<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 10</title>
    <style>
        .circulo {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin: 5px;
        background-color: gray;
        }
    </style>
</head>
<body>

    <div id="red" class="circulo"></div>
    <div id="orange" class="circulo"></div>
    <div id="green" class="circulo"></div>

    <button id="btn">Siguiente</button>
    <p id="resultado"></p>

    <script>
        const estados = ["red", "orange", "green"];
        const textos = ["Stop", "Atención", "Adelante"];
        let estado = 0;

        function actualizarSemaforo() {
        document.getElementById("red").style.backgroundColor = "gray";
        document.getElementById("orange").style.backgroundColor = "gray";
        document.getElementById("green").style.backgroundColor = "gray";

        document.getElementById(estados[estado]).style.backgroundColor = estados[estado];

        document.getElementById("resultado").innerHTML = textos[estado];
        }
        actualizarSemaforo();
        document.getElementById("btn").addEventListener("click", function() {
        estado = (estado + 1) % 3;
        actualizarSemaforo();
        });
    </script>

</body>
</html>
